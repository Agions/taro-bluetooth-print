<?xml version="1.0" encoding="UTF-8"?>
<!--
  taro-bluetooth-print · horizontal wordmark
  Mark + name side-by-side, suitable for headers & README banners.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 96" role="img"
     aria-label="taro-bluetooth-print">
  <defs>
    <linearGradient id="w-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4338ca"/>
      <stop offset="55%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Mark tile -->
  <g transform="translate(8, 12)">
    <rect width="72" height="72" rx="18" fill="url(#w-grad)"/>
    <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="2.4" stroke-opacity="0.7">
      <path d="M 50 16 Q 58 16 58 24"/>
      <path d="M 46 10 Q 62 10 62 26" stroke-opacity="0.4"/>
    </g>
    <circle cx="52" cy="22" r="1.8" fill="#ffffff"/>
    <rect x="16" y="22" width="40" height="42" rx="4" fill="#f8fafc"/>
    <rect x="20" y="28" width="32" height="4" rx="1" fill="#1e293b"/>
    <rect x="20" y="36" width="28" height="3" rx="1" fill="#475569"/>
    <rect x="20" y="42" width="32" height="3" rx="1" fill="#475569"/>
    <g fill="#0f172a">
      <rect x="20" y="50" width="8" height="8"/>
      <rect x="30" y="50" width="8" height="8"/>
      <rect x="40" y="50" width="8" height="8"/>
      <rect x="22" y="60" width="6" height="6"/>
      <rect x="30" y="60" width="6" height="6"/>
      <rect x="38" y="60" width="6" height="6"/>
    </g>
  </g>

  <!-- Name -->
  <g transform="translate(108, 0)" fill="#0f172a">
    <text x="0" y="50" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-weight="800" font-size="34" letter-spacing="-0.6">
      taro<tspan fill="#6366f1">·</tspan>bluetooth<tspan fill="#6366f1">·</tspan>print
    </text>
    <text x="2" y="76" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-weight="500" font-size="14" fill="#64748b" letter-spacing="0.4">
      CROSS-PLATFORM · MULTI-PROTOCOL · ZERO-DEPENDENCY
    </text>
  </g>
</svg>
