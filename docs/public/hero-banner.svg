<?xml version="1.0" encoding="UTF-8"?>
<!--
  Wide hero banner (1600×400) for the docs landing page.
  Soft purple→cyan gradient with a faint receipt + waveform watermark.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" role="img">
  <defs>
    <linearGradient id="hb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#eef2ff"/>
      <stop offset="50%"  stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <linearGradient id="hb-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="400" fill="url(#hb-bg)"/>

  <!-- Soft wave ribbons (decorative) -->
  <g fill="none" stroke="url(#hb-accent)" stroke-opacity="0.12" stroke-linecap="round" stroke-width="1.5">
    <path d="M -50 80  Q 200 40, 400 80  T 800 80  T 1200 80  T 1700 80"/>
    <path d="M -50 320 Q 200 280, 400 320 T 800 320 T 1200 320 T 1700 320"/>
    <path d="M -50 200 Q 200 160, 400 200 T 800 200 T 1200 200 T 1700 200" stroke-opacity="0.08"/>
  </g>

  <!-- Receipt tile preview -->
  <g transform="translate(120, 100)">
    <rect width="200" height="220" rx="14" fill="#ffffff"/>
    <rect x="200" y="0" width="6" height="220" fill="#cbd5e1"/>
    <rect x="206" y="20"  width="100" height="14" rx="3" fill="#1e293b"/>
    <rect x="206" y="44"  width="80"  height="6"  rx="2" fill="#475569"/>
    <rect x="206" y="58"  width="100" height="6"  rx="2" fill="#475569"/>
    <rect x="206" y="72"  width="70"  height="6"  rx="2" fill="#475569"/>
    <g fill="#0f172a">
      <rect x="212" y="100" width="14" height="14"/>
      <rect x="230" y="100" width="14" height="14"/>
      <rect x="248" y="100" width="14" height="14"/>
      <rect x="284" y="100" width="14" height="14"/>
      <rect x="320" y="100" width="14" height="14"/>
      <rect x="212" y="118" width="14" height="14"/>
      <rect x="266" y="118" width="14" height="14"/>
      <rect x="320" y="118" width="14" height="14"/>
      <rect x="230" y="136" width="14" height="14"/>
      <rect x="248" y="136" width="14" height="14"/>
      <rect x="284" y="136" width="14" height="14"/>
      <rect x="212" y="154" width="14" height="14"/>
      <rect x="266" y="154" width="14" height="14"/>
      <rect x="300" y="154" width="14" height="14"/>
      <rect x="330" y="154" width="14" height="14"/>
    </g>
  </g>

  <!-- Bluetooth waveform (right) -->
  <g transform="translate(1380, 90)" stroke="url(#hb-accent)" fill="none" stroke-width="2" stroke-linecap="round">
    <path d="M 0 110 Q 30 60, 60 110 T 120 110 T 180 110" stroke-opacity="0.7"/>
    <path d="M 0 110 Q 30 30, 60 110 T 120 110 T 180 110" stroke-opacity="0.35"/>
    <path d="M 0 110 Q 30 0,  60 110 T 120 110 T 180 110" stroke-opacity="0.2"/>
    <circle cx="-12" cy="110" r="4" fill="url(#hb-accent)"/>
  </g>

  <!-- A second smaller tile -->
  <g transform="translate(1080, 240)" opacity="0.65">
    <rect width="120" height="120" rx="10" fill="#ffffff"/>
    <g fill="#475569">
      <rect x="14" y="24" width="80" height="8" rx="2"/>
      <rect x="14" y="40" width="60" height="5" rx="2"/>
      <rect x="14" y="52" width="74" height="5" rx="2"/>
      <rect x="14" y="64" width="50" height="5" rx="2"/>
    </g>
  </g>
</svg>
