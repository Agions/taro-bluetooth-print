    <path d="M 22 6 Q 27 6 27 11" stroke-width="1.8" stroke-opacity="0.85"/>
    <path d="M 20 3 Q 30 3 30 13" stroke-width="1.8" stroke-opacity="0.45"/>
    <circle cx="24" cy="8" r="0.9" fill="#ffffff" stroke="none"/>
    <!-- Receipt body -->
    <rect x="8" y="10" width="16" height="18" rx="2" fill="#ffffff" stroke="none"/>
    <rect x="10" y="13" width="12" height="2" rx="0.8" fill="#1e293b" stroke="none"/>
    <rect x="10" y="17" width="10" height="1.4" rx="0.6" fill="#475569" stroke="none"/>
    <rect x="10" y="20" width="12" height="1.4" rx="0.6" fill="#475569" stroke="none"/>
    <g fill="#0f172a" stroke="none">
      <rect x="10" y="23" width="2.8" height="2.8"/>
      <rect x="13.5" y="23" width="2.8" height="2.8"/>
      <rect x="17" y="23" width="2.8" height="2.8"/>
    </g>
  </g>
