<?xml version="1.0" encoding="UTF-8"?>
<!--
  taro-bluetooth-print · favicon (32×32) — minimalist mark for browser tabs.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="fv-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4338ca"/>
      <stop offset="60%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#fv-g)"/>
  <g stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" fill="none">
