<?xml version="1.0" encoding="UTF-8"?>
<!--
  taro-bluetooth-print · logo mark (icon-only)
  Compact square — perfect for app icons, badges, social avatars.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img"
     aria-label="TBP logo mark">
  <defs>
    <linearGradient id="m-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4338ca"/>
      <stop offset="55%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#m-grad)"/>
  <!-- Bluetooth arcs -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="2.6" stroke-opacity="0.7">
    <path d="M 44 14 Q 52 14 52 22"/>
    <path d="M 40 8 Q 56 8 56 24" stroke-opacity="0.4"/>
  </g>
  <circle cx="46" cy="20" r="1.6" fill="#ffffff"/>
  <!-- Receipt body -->
  <rect x="14" y="20" width="32" height="36" rx="3" fill="#f8fafc"/>
  <rect x="18" y="26" width="24" height="3" rx="1" fill="#1e293b"/>
  <rect x="18" y="32" width="22" height="2" rx="1" fill="#475569"/>
  <rect x="18" y="36" width="18" height="2" rx="1" fill="#475569"/>
  <rect x="18" y="40" width="24" height="2" rx="1" fill="#475569"/>
  <g fill="#0f172a">
    <rect x="18" y="46" width="6" height="6"/>
    <rect x="26" y="46" width="6" height="6"/>
    <rect x="34" y="46" width="6" height="6"/>
  </g>
</svg>
