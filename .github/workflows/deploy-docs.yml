name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Cache VitePress build cache
        uses: actions/cache@v4
        with:
          path: docs/.vitepress/cache
          key: ${{ runner.os }}-vitepress-${{ hashFiles('docs/.vitepress/config.ts') }}
          restore-keys: |
            ${{ runner.os }}-vitepress-

      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Build VitePress site
        run: |
          npm run docs:full
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          CI: true
          GITHUB_PAGES: true

      - name: Copy .nojekyll for GitHub Pages
        run: |
          cp .nojekyll docs/.vitepress/dist/
          echo "Copied .nojekyll to dist directory"

      - name: Verify build output and routing
        run: |
          ls -la docs/.vitepress/dist || exit 1

          # 验证关键文件存在
          test -f docs/.vitepress/dist/index.html || exit 1
          test -f docs/.vitepress/dist/404.html || exit 1
          test -f docs/.vitepress/dist/.nojekyll || exit 1
          test -f docs/.vitepress/dist/api/index.html || exit 1

          # 验证静态资源路径正确
          grep -q "/taro-bluetooth-print/" docs/.vitepress/dist/index.html || exit 1

          echo "✅ Build artifacts and routing verified successfully"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
